    <script>
        (function() {
            var images = [
                "IMG_0405", "IMG_0409", "IMG_0413", "IMG_0419", "IMG_0440 2", "IMG_0443", "IMG_0445", "IMG_0454", "IMG_0455",
                "IMG_0463", "IMG_0467", "IMG_0475", "IMG_0485", "IMG_0487", "IMG_0489", "IMG_0499", "IMG_0510", "IMG_0513", "IMG_0517",
                "IMG_0530", "IMG_0531", "IMG_0532", "IMG_0533", "IMG_0535", "IMG_0542", "IMG_0543", "IMG_0547", "IMG_0555", "IMG_0560",
                "IMG_0563", "IMG_0565", "IMG_0567", "IMG_0572", "IMG_0573", "IMG_0581", "IMG_0582", "IMG_0587", "IMG_0588", "IMG_0589",
                "IMG_0590", "IMG_0602", "IMG_0610", "IMG_0614", "IMG_0617", "IMG_0630", "IMG_0633", "IMG_0635", "IMG_0640", "IMG_0644",
                "IMG_0645", "IMG_0648", "IMG_0651", "IMG_0656", "IMG_0657", "IMG_0662", "IMG_0667", "IMG_0670", "IMG_0671", "IMG_0672",
                "IMG_0675", "IMG_0678", "IMG_0682", "IMG_0685", "IMG_0688", "IMG_0690", "IMG_0693", "IMG_0694", "IMG_0695", "IMG_0696",
                "IMG_0704", "IMG_0705", "IMG_0735", "IMG_0736", "IMG_0737", "IMG_0740", "IMG_0753"
            ];
            for (var i = images.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var t = images[i];
                images[i] = images[j];
                images[j] = t;
            }
            var grid = document.getElementById('gallery-grid');
            if (!grid) return;
            images.forEach(function(base) {
                var fullSrc = 'gallery/' + encodeURIComponent(base + '.JPG');
                var thumbSrc = 'gallery/thumbs/' + encodeURIComponent(base + '.jpg');
                var a = document.createElement('a');
                a.href = fullSrc;
                a.className = 'gallery-item';
                a.setAttribute('data-lightbox', '');
                var img = document.createElement('img');
                img.src = thumbSrc;
                img.alt = 'Photo from AMTF 2025';
                img.loading = 'lazy';
                a.appendChild(img);
                grid.appendChild(a);
            });

            var lightbox = document.getElementById('gallery-lightbox');
            var img = lightbox && lightbox.querySelector('.gallery-lightbox-img');
            var closeBtn = lightbox && lightbox.querySelector('.gallery-lightbox-close');
            if (!lightbox || !img) return;

            function openLightbox(src, altText) {
                img.classList.add('gallery-lightbox-img--loading');
                img.src = src;
                img.alt = altText || 'Photo from AMTF 2025';
                img.onload = function() { img.classList.remove('gallery-lightbox-img--loading'); };
                lightbox.setAttribute('aria-hidden', 'false');
                lightbox.classList.add('gallery-lightbox--open');
                document.body.style.overflow = 'hidden';
                if (closeBtn) closeBtn.focus();
            }

            function closeLightbox() {
                lightbox.setAttribute('aria-hidden', 'true');
                lightbox.classList.remove('gallery-lightbox--open');
                document.body.style.overflow = '';
            }

            document.querySelectorAll('[data-lightbox]').forEach(function(link) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    var thumbImg = this.querySelector('img');
                    openLightbox(this.getAttribute('href'), thumbImg ? thumbImg.alt : 'Photo from AMTF 2025');
                });
            });

            if (closeBtn) closeBtn.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', function(e) {
                if (e.target === lightbox) closeLightbox();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && lightbox.classList.contains('gallery-lightbox--open')) closeLightbox();
            });
        })();
    </script>
